<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Warm-cast, three levels" name="Shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--ds-cream);height:170px;display:flex;align-items:center;justify-content:center;gap:40px;font-family:var(--font-ui);}
.b{display:flex;flex-direction:column;align-items:center;gap:14px;}
.box{width:96px;height:64px;background:var(--ds-snow);border-radius:10px;}
.l{font-size:11px;color:var(--ds-ink-soft);font-family:var(--font-mono);}</style></head>
<body>
  <div class="b"><div class="box" style="box-shadow:var(--shadow-1)"></div><span class="l">shadow-1</span></div>
  <div class="b"><div class="box" style="box-shadow:var(--shadow-2)"></div><span class="l">shadow-2</span></div>
  <div class="b"><div class="box" style="box-shadow:var(--shadow-3)"></div><span class="l">shadow-3 · hover</span></div>
</body></html>
