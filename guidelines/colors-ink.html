<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}.g{display:flex;height:130px;font-family:var(--font-ui);}
.s{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
.n{font-weight:600;font-size:12px;}.h{font-size:11px;opacity:.8;font-family:var(--font-mono);}</style></head>
<body><div class="g">
  <div class="s" style="background:var(--ds-cocoa);color:#fff"><span class="n">Cocoa</span><span class="h">#4D2D25</span></div>
  <div class="s" style="background:var(--ds-ink);color:#fff"><span class="n">Ink</span><span class="h">#1D2021</span></div>
  <div class="s" style="background:var(--ds-ink-soft);color:#fff"><span class="n">Ink soft</span><span class="h">#757575</span></div>
  <div class="s" style="background:var(--ds-line);color:var(--ds-cocoa)"><span class="n">Line</span><span class="h">#E8DCC8</span></div>
</div></body></html>
