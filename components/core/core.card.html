<!-- @dsCard group="Components" viewport="700x210" subtitle="Buttons (primary · secondary · ghost) + badges" name="Core" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>html,body{margin:0}
body{background:var(--ds-cream);min-height:210px;box-sizing:border-box;padding:30px;display:flex;flex-direction:column;gap:24px;justify-content:center;}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.btn{font-family:var(--font-ui);font-weight:600;letter-spacing:.06em;text-transform:uppercase;line-height:1;border-radius:var(--r-sm);border:1px solid transparent;cursor:pointer;padding:12px 24px;font-size:15px;box-shadow:var(--shadow-1);}
.primary{background:var(--ds-terracotta);color:var(--ds-cream);}
.secondary{background:var(--ds-indigo);color:var(--ds-cream);}
.ghost{background:transparent;color:var(--ds-cocoa);border-color:var(--ds-line);box-shadow:none;}
.sm{padding:8px 16px;font-size:13px;}
.badge{display:inline-block;font-family:var(--font-ui);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:5px 10px;border-radius:var(--r-xs);}
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Reserve a table</button>
    <button class="btn secondary">Plan a stay</button>
    <button class="btn ghost">View menu</button>
    <button class="btn primary sm">Small</button>
  </div>
  <div class="row">
    <span class="badge" style="background:var(--ds-gold);color:var(--ds-cocoa)">New</span>
    <span class="badge" style="background:var(--ds-terracotta);color:var(--ds-cream)">Poolside</span>
    <span class="badge" style="background:var(--ds-indigo);color:var(--ds-cream)">Open</span>
    <span class="badge" style="background:var(--ds-bone);color:var(--ds-cocoa)">Seasonal</span>
  </div>
</body></html>
