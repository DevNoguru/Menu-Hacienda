<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4 → 128px ramp" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--ds-cream);height:150px;display:flex;align-items:center;gap:14px;padding:0 24px;box-sizing:border-box;font-family:var(--font-ui);}
.b{display:flex;flex-direction:column;align-items:center;gap:8px;}
.box{background:var(--ds-terracotta);border-radius:3px;}
.l{font-size:10px;color:var(--ds-ink-soft);font-family:var(--font-mono);}</style></head>
<body>
  <div class="b"><div class="box" style="width:8px;height:8px"></div><span class="l">8</span></div>
  <div class="b"><div class="box" style="width:16px;height:16px"></div><span class="l">16</span></div>
  <div class="b"><div class="box" style="width:24px;height:24px"></div><span class="l">24</span></div>
  <div class="b"><div class="box" style="width:32px;height:32px"></div><span class="l">32</span></div>
  <div class="b"><div class="box" style="width:48px;height:48px"></div><span class="l">48</span></div>
  <div class="b"><div class="box" style="width:64px;height:64px"></div><span class="l">64</span></div>
  <div class="b"><div class="box" style="width:96px;height:96px"></div><span class="l">96</span></div>
</body></html>
