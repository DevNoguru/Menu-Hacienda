<!-- @dsCard group="Type" viewport="700x180" subtitle="Caps · Outline · Soft · Texture · Slim" name="El Camino family" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}.row{display:flex;gap:10px;height:180px;align-items:stretch;padding:14px;box-sizing:border-box;background:var(--ds-indigo);}
.c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:8px;background:rgba(255,255,255,.05);}
.l{font-family:var(--font-ui);font-weight:600;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ds-peach);}
.w{font-size:34px;line-height:.9;color:var(--ds-cream);}</style></head>
<body><div class="row">
  <div class="c"><span class="l">Caps</span><span class="w" style="font-family:var(--font-sign);text-shadow:2px 2px 0 var(--ds-terracotta);">SOL</span></div>
  <div class="c"><span class="l">Outline</span><span class="w" style="font-family:var(--font-sign-outline);">SOL</span></div>
  <div class="c"><span class="l">Soft</span><span class="w" style="font-family:var(--font-sign-soft);color:var(--ds-peach);">SOL</span></div>
  <div class="c"><span class="l">Texture</span><span class="w" style="font-family:var(--font-sign-texture);color:var(--ds-gold);">SOL</span></div>
  <div class="c"><span class="l">Slim</span><span class="w" style="font-family:var(--font-sign-slim);color:var(--ds-cream);">Sol</span></div>
</div></body></html>
