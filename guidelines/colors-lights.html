<!-- @dsCard group="Colors" viewport="700x150" subtitle="Peach, cream, bone, sand" name="Warm lights" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}.g{display:flex;height:150px;font-family:var(--font-ui);}
.s{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:var(--ds-cocoa);}
.n{font-weight:600;font-size:12px;}.h{font-size:11px;opacity:.7;font-family:var(--font-mono);}</style></head>
<body><div class="g">
  <div class="s" style="background:var(--ds-peach)"><span class="n">Peach</span><span class="h">#F3B495</span></div>
  <div class="s" style="background:var(--ds-peach-light)"><span class="n">Peach light</span><span class="h">#F5B99F</span></div>
  <div class="s" style="background:var(--ds-cream);border:1px solid var(--ds-line)"><span class="n">Cream</span><span class="h">#FAF5EC</span></div>
  <div class="s" style="background:var(--ds-bone);border:1px solid var(--ds-line)"><span class="n">Bone</span><span class="h">#EAE6DD</span></div>
  <div class="s" style="background:var(--ds-sand);border:1px solid var(--ds-line)"><span class="n">Sand</span><span class="h">#F2E2CE</span></div>
</div></body></html>
