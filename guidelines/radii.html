<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Soft-square — 4 / 6 / 10 / 16px + pill" name="Corner radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0}body{background:var(--ds-cream);height:150px;display:flex;align-items:center;justify-content:center;gap:22px;font-family:var(--font-ui);}
.b{display:flex;flex-direction:column;align-items:center;gap:10px;}
.box{width:64px;height:64px;background:var(--ds-bone);border:1.5px solid var(--ds-terracotta);}
.l{font-size:11px;color:var(--ds-ink-soft);font-family:var(--font-mono);}</style></head>
<body>
  <div class="b"><div class="box" style="border-radius:4px"></div><span class="l">xs · 4</span></div>
  <div class="b"><div class="box" style="border-radius:6px"></div><span class="l">sm · 6</span></div>
  <div class="b"><div class="box" style="border-radius:10px"></div><span class="l">md · 10</span></div>
  <div class="b"><div class="box" style="border-radius:16px"></div><span class="l">lg · 16</span></div>
  <div class="b"><div class="box" style="border-radius:999px"></div><span class="l">pill</span></div>
</body></html>
